<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    #ws-status {
      margin-left: auto;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #666;
    }
    #ws-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    #ws-dot.connected    { background: #22c55e; }
    #ws-dot.connecting   { background: #f59e0b; }
    #ws-dot.disconnected { background: #ef4444; }

    main {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Input card ── */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px 24px;
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }
    #url-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #url-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    #url-input:disabled { background: #f9fafb; color: #9ca3af; }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #paste-btn {
      background: #f3f4f6;
      color: #374151;
    }
    #paste-btn:hover:not(:disabled) { background: #e5e7eb; }

    #submit-btn {
      background: #6366f1;
      color: #fff;
      padding: 9px 22px;
    }
    #submit-btn:hover:not(:disabled) { background: #4f46e5; }

    #stop-btn {
      background: #ef4444;
      color: #fff;
      padding: 9px 18px;
      display: none;
    }
    #stop-btn:hover:not(:disabled) { background: #dc2626; }

    /* ── Stage list ── */
    #stages-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stage-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      animation: fadeSlideIn 0.2s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stage-item.pending  { color: #6b7280; }
    .stage-item.ok       { color: #16a34a; background: #f0fdf4; }
    .stage-item.warn     { color: #b45309; background: #fffbeb; }
    .stage-item.error    { color: #dc2626; background: #fef2f2; }
    .stage-icon { flex-shrink: 0; width: 18px; text-align: center; }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LLM stream panel ── */
    #llm-panel { display: none; }
    #llm-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6366f1;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #llm-output {
      width: 100%;
      height: 220px;
      max-height: 40vh;
      resize: vertical;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #1e293b;
      border-radius: 7px;
      padding: 12px 14px;
      font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.55;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Result banner ── */
    #result-banner {
      display: none;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      animation: fadeSlideIn 0.3s ease;
    }
    #result-banner.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #15803d;
    }
    #result-banner.failure {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
    }
    #result-banner a { color: inherit; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
  <h1>Paper Tool</h1>
  <div id="ws-status">
    <div id="ws-dot" class="connecting"></div>
    <span id="ws-label">连接中...</span>
  </div>
</header>

<main>
  <!-- Input card -->
  <div class="card">
    <div class="card-title">添加论文</div>
    <div class="input-row">
      <input id="url-input" type="url" placeholder="粘贴 Arxiv 或 OpenReview 链接..." autocomplete="off" spellcheck="false" />
      <button id="paste-btn" title="从剪贴板粘贴">粘贴</button>
      <button id="submit-btn" disabled>处理</button>
      <button id="stop-btn">停止</button>
    </div>
  </div>

  <!-- Pipeline stages -->
  <div class="card" id="stages-card" style="display:none;">
    <div class="card-title">处理进度</div>
    <ul id="stages-list"></ul>
  </div>

  <!-- LLM stream -->
  <div class="card" id="llm-panel">
    <div id="llm-title">LLM 输出</div>
    <div id="llm-output"></div>
  </div>

  <!-- Result banner -->
  <div id="result-banner"></div>
</main>

<script>
  const urlInput   = document.getElementById('url-input');
  const pasteBtn   = document.getElementById('paste-btn');
  const submitBtn  = document.getElementById('submit-btn');
  const stopBtn    = document.getElementById('stop-btn');
  const stagesCard = document.getElementById('stages-card');
  const stagesList = document.getElementById('stages-list');
  const llmPanel   = document.getElementById('llm-panel');
  const llmTitle   = document.getElementById('llm-title');
  const llmOutput  = document.getElementById('llm-output');
  const wsDot      = document.getElementById('ws-dot');
  const wsLabel    = document.getElementById('ws-label');
  const resultBanner = document.getElementById('result-banner');

  let ws = null;
  let processing = false;
  // Map stage key → <li> element for updating in-place
  const stageEls = {};

  // ── WebSocket ────────────────────────────────────────────────────────
  function wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/ws/process`;
  }

  function setWsState(state) {
    wsDot.className = state;
    wsLabel.textContent = { connected: '已连接', connecting: '连接中...', disconnected: '已断开' }[state] || state;
    submitBtn.disabled = state !== 'connected' || processing;
  }

  function connect() {
    setWsState('connecting');
    ws = new WebSocket(wsUrl());

    ws.onopen = () => setWsState('connected');

    ws.onclose = () => {
      setWsState('disconnected');
      if (processing) endProcessing(false, null);
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {};

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handleEvent(msg);
    };
  }

  // ── Event handler ────────────────────────────────────────────────────
  function handleEvent(msg) {
    switch (msg.type) {

      case 'stage_start': {
        const li = document.createElement('li');
        li.className = 'stage-item pending';
        li.dataset.stage = msg.stage;
        li.innerHTML = `<span class="stage-icon"><span class="spin">⏳</span></span><span>${escHtml(msg.label)}</span>`;
        stagesList.appendChild(li);
        stageEls[msg.stage] = li;
        stagesCard.style.display = '';
        break;
      }

      case 'stage_done': {
        // Find the last pending item (stage key may not be provided in done events)
        const li = findLastPending();
        if (li) {
          const isWarn = msg.status === 'warn';
          li.className = `stage-item ${isWarn ? 'warn' : 'ok'}`;
          li.innerHTML = `<span class="stage-icon">${isWarn ? '⚠️' : '✅'}</span><span>${escHtml(msg.label)}</span>`;
        }
        break;
      }

      case 'llm_start': {
        llmPanel.style.display = 'block';
        llmTitle.textContent = msg.title || 'LLM 输出';
        llmOutput.textContent = '';
        break;
      }

      case 'llm_token': {
        llmOutput.textContent += msg.text;
        llmOutput.scrollTop = llmOutput.scrollHeight;
        break;
      }

      case 'llm_end': {
        break;
      }

      case 'done': {
        endProcessing(msg.success !== false, msg.page_url || null);
        break;
      }

      case 'error': {
        addErrorStage(msg.message || '未知错误');
        endProcessing(false, null);
        break;
      }
    }
  }

  function findLastPending() {
    const items = stagesList.querySelectorAll('.stage-item.pending');
    return items.length ? items[items.length - 1] : null;
  }

  function addErrorStage(msg) {
    const li = findLastPending();
    if (li) {
      li.className = 'stage-item error';
      li.innerHTML = `<span class="stage-icon">❌</span><span>${escHtml(msg)}</span>`;
    } else {
      const li2 = document.createElement('li');
      li2.className = 'stage-item error';
      li2.innerHTML = `<span class="stage-icon">❌</span><span>${escHtml(msg)}</span>`;
      stagesList.appendChild(li2);
      stagesCard.style.display = '';
    }
  }

  function endProcessing(success, pageUrl) {
    processing = false;
    urlInput.disabled = false;
    submitBtn.disabled = ws?.readyState !== WebSocket.OPEN;
    submitBtn.style.display = '';
    stopBtn.style.display = 'none';
    stopBtn.disabled = false;
    stopBtn.textContent = '停止';

    resultBanner.style.display = 'block';
    if (success) {
      resultBanner.className = 'success';
      const link = pageUrl
        ? `<a href="${escAttr(pageUrl)}" target="_blank" rel="noopener">在 Notion 中查看 →</a>`
        : '处理完成';
      resultBanner.innerHTML = `✅ 论文已成功添加。${link}`;
    } else {
      resultBanner.className = 'failure';
      resultBanner.textContent = '❌ 处理失败，请查看上方错误信息。';
    }
  }

  // ── Submit ───────────────────────────────────────────────────────────
  function submit() {
    const url = urlInput.value.trim();
    if (!url || processing) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    // Reset UI
    stagesList.innerHTML = '';
    Object.keys(stageEls).forEach(k => delete stageEls[k]);
    stagesCard.style.display = 'none';
    llmPanel.style.display = 'none';
    llmOutput.textContent = '';
    resultBanner.style.display = 'none';

    processing = true;
    urlInput.disabled = true;
    submitBtn.disabled = true;
    submitBtn.style.display = 'none';
    stopBtn.style.display = 'inline-block';

    ws.send(JSON.stringify({ action: 'add', url }));
  }

  submitBtn.addEventListener('click', submit);
  urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  stopBtn.addEventListener('click', () => {
    if (!processing || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ action: 'stop' }));
    stopBtn.disabled = true;
    stopBtn.textContent = '正在停止...';
  });

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text.trim();
      urlInput.focus();
    } catch {
      urlInput.focus();
    }
  });

  // ── Helpers ──────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escAttr(s) { return escHtml(s); }

  connect();
</script>
</body>
</html>
